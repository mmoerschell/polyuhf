[tool.ruff]
# Check all style-related rules
lint.select = ["E", "W", "F", "C", "N", "I", "B"]

exclude = [
    "src/parsing/antlr/PolyUHFLexer.py",
    "src/parsing/antlr/PolyUHFParser.py",
    "src/parsing/antlr/PolyUHFVisitor.py",
]

# Line length
line-length = 88

# Enable auto-fixing where possible
lint.fixable = ["E", "W", "F", "I", "B"]  # Only auto-fix these
